<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinguaSpace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { padding-bottom: 140px; -webkit-tap-highlight-color: transparent; }
        .sticky-header { position: sticky; top: 0; z-index: 60; }
        .sticky-nav { position: sticky; top: 60px; z-index: 50; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(5px); }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Reader Styles */
        .text-reader { font-family: 'Georgia', serif; font-size: 1.125rem; line-height: 1.8; color: #334155; }
        .word-clickable { cursor: pointer; border-radius: 4px; transition: all 0.2s; padding: 0 2px; border-bottom: 1px dotted transparent; }
        .word-clickable:hover { background-color: #e0e7ff; color: #4338ca; border-bottom-color: #4338ca; }
        
        /* Subtle green highlight for saved words */
        .word-saved { font-weight: 500; color: #0f172a; border-bottom: 2px solid #34d399; background-color: transparent; }
        .word-saved:hover { background-color: #ecfdf5; border-bottom-color: #10b981; }
        
        /* YouTube Subs & PiP */
        .yt-sub-line { transition: all 0.3s ease; border-radius: 8px; padding: 6px 10px; margin: 2px 0; display: block; border-left: 3px solid transparent; cursor: pointer; }
        .yt-sub-line:hover { background-color: #f8fafc; border-left-color: #cbd5e1; }
        .yt-sub-line.active-sub { background-color: #eef2ff; border-left-color: #4f46e5; color: #1e1b4b; font-weight: 500; transform: scale(1.01); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

        /* PiP Fixes */
        .yt-pip-mode { 
            position: fixed !important; 
            top: auto !important;
            bottom: 20px !important; 
            right: 20px !important; 
            width: 320px !important; 
            height: 180px !important; 
            z-index: 100; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4); 
            transition: all 0.3s ease; 
        }
        @media (max-width: 640px) { .yt-pip-mode { width: 240px !important; height: 135px !important; bottom: 10px !important; right: 10px !important; } }

        #reader-content-wrapper { scroll-behavior: smooth; }

        /* Constructor & Inline Context */
        .letter-slot { min-width: 2.2rem; min-height: 2.8rem; border-bottom: 3px solid #cbd5e1; transition: all 0.2s; }
        .letter-tile { transition: transform 0.1s; cursor: pointer; }
        .letter-tile:active { transform: scale(0.9); }
        
        .inline-input-context { display: inline-block; width: 120px; border: none; border-bottom: 2px solid #a5b4fc; background: #eef2ff; color: #4338ca; font-weight: bold; text-align: center; outline: none; border-radius: 4px 4px 0 0; padding: 0 4px; transition: all 0.2s; font-family: inherit; font-size: inherit; }
        .inline-input-context:focus { border-bottom-color: #4f46e5; background: #e0e7ff; }

        /* Helpers */
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid #4f46e5; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .srs-ring circle { transition: stroke-dasharray 0.5s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans">

    <div id="system-status" class="bg-blue-500 text-white text-center py-1.5 text-xs font-bold uppercase tracking-wider transition-all duration-500 shadow-md z-[100] relative">Підключення...</div>

    <div id="custom-modal" class="hidden fixed inset-0 z-[200] bg-slate-900 bg-opacity-50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full text-center">
            <p id="modal-text" class="text-slate-800 font-semibold mb-6 text-lg"></p>
            <div class="flex gap-3 justify-center">
                <button id="modal-btn-ok" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-bold shadow-sm">OK</button>
                <button id="modal-btn-cancel" class="hidden flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-3 rounded-xl font-bold border">Скасувати</button>
            </div>
        </div>
    </div>

    <!-- Modal: SRS Info & Reset -->
    <div id="srs-info-modal" class="hidden fixed inset-0 z-[200] bg-slate-900 bg-opacity-20 backdrop-blur-sm flex items-center justify-center p-4" onclick="closeSrsModal(event)">
        <div class="bg-white p-5 rounded-2xl shadow-xl max-w-xs w-full text-center transform scale-95 transition-transform" id="srs-info-content">
            <input type="hidden" id="srs-info-word-id">
            <div class="text-4xl mb-2" id="srs-info-emoji">⏳</div>
            <h4 class="font-bold text-slate-800 text-lg mb-1" id="srs-info-word">word</h4>
            <p class="text-sm font-bold text-indigo-600 mb-2" id="srs-info-level">Рівень: 1/4</p>
            <p class="text-xs text-slate-500 mb-4 bg-slate-50 p-2 rounded-lg border border-slate-100" id="srs-info-time"></p>
            
            <button id="srs-btn-reset" onclick="resetWordProgress()" class="hidden w-full bg-rose-100 hover:bg-rose-200 text-rose-700 py-2.5 rounded-xl font-bold text-sm shadow-sm mb-2 transition">Скинути прогрес</button>
            <button onclick="document.getElementById('srs-info-modal').classList.add('hidden')" class="w-full bg-slate-800 text-white py-2.5 rounded-xl font-bold text-sm shadow-sm">Закрити</button>
        </div>
    </div>

    <!-- Modal: Edit Word -->
    <div id="edit-word-modal" class="hidden fixed inset-0 z-[160] bg-slate-900 bg-opacity-50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-md w-full relative">
            <button onclick="closeEditModal()" class="absolute top-4 right-5 text-slate-400 hover:text-slate-700 font-bold text-2xl">&times;</button>
            <h3 class="text-xl font-bold text-slate-800 mb-4">Редагувати слово</h3>
            <input type="hidden" id="edit-word-id">
            <div class="mb-3">
                <label class="text-xs font-bold text-slate-500 uppercase block mb-1">Слово</label>
                <input type="text" id="edit-word-en" class="w-full p-3 border border-slate-300 rounded-xl outline-none focus:border-indigo-500 font-bold text-slate-800">
            </div>
            <div class="mb-3">
                <label class="text-xs font-bold text-slate-500 uppercase block mb-1">Переклад</label>
                <input type="text" id="edit-word-uk" class="w-full p-3 border border-slate-300 rounded-xl outline-none focus:border-indigo-500 font-bold text-slate-800">
            </div>
            <div class="mb-4">
                <label class="text-xs font-bold text-slate-500 uppercase block mb-1">Контекст (Речення)</label>
                <textarea id="edit-word-ctx" rows="3" class="w-full p-3 border border-slate-300 rounded-xl outline-none focus:border-indigo-500 text-sm custom-scroll"></textarea>
            </div>
            <button onclick="saveEditedWord()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-3 rounded-xl font-bold shadow-sm transition">Зберегти зміни</button>
        </div>
    </div>

    <!-- Modal: Sync Account ID -->
    <div id="sync-modal" class="hidden fixed inset-0 z-[160] bg-slate-900 bg-opacity-50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full relative">
            <button onclick="closeSyncModal()" class="absolute top-4 right-5 text-slate-400 hover:text-slate-700 font-bold text-2xl">&times;</button>
            <h3 class="text-xl font-bold text-slate-800 mb-2 text-center">Профіль 📱💻</h3>
            <div class="mb-5 mt-4">
                <label class="text-xs font-bold text-slate-500 uppercase block mb-1">Поточний ID:</label>
                <div class="flex">
                    <input type="text" id="sync-current-uid" readonly class="w-full p-2 bg-slate-50 border border-slate-300 border-r-0 rounded-l-xl font-mono text-xs font-bold text-slate-700 outline-none">
                    <button onclick="copyUid()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 rounded-r-xl font-bold text-sm transition">Копіювати</button>
                </div>
            </div>
            <div class="border-t border-slate-100 pt-4 mb-3">
                <label class="text-xs font-bold text-slate-500 uppercase block mb-1">Змінити ID (для іншого словника):</label>
                <input type="text" id="sync-input-uid" placeholder="Вставте інший ID..." class="w-full p-3 border border-slate-300 rounded-xl outline-none focus:border-indigo-500 font-mono text-xs mb-3">
                <button onclick="applyUid()" class="w-full bg-slate-800 hover:bg-slate-900 text-white py-3 rounded-xl font-bold shadow-sm transition">Застосувати ID</button>
            </div>
            <button onclick="resetUid()" class="w-full text-rose-500 hover:text-rose-600 font-bold text-sm py-2 transition">Повернутись до спільного ID</button>
        </div>
    </div>

    <!-- Modal: Bulk Import -->
    <div id="bulk-add-modal" class="hidden fixed inset-0 z-[160] bg-slate-900 bg-opacity-50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-lg w-full relative max-h-[90vh] flex flex-col">
            <button onclick="closeBulkModal()" class="absolute top-4 right-5 text-slate-400 hover:text-slate-700 font-bold text-2xl">&times;</button>
            <h3 class="text-xl font-bold text-slate-800 mb-2">📥 Масовий імпорт слів</h3>
            <textarea id="bulk-input-text" rows="6" class="w-full p-3 border border-slate-300 rounded-xl outline-none focus:border-indigo-500 text-sm mb-4 font-mono custom-scroll" placeholder="anxiety - тривога&#10;resilient"></textarea>
            
            <div id="bulk-preview-area" class="hidden flex-1 overflow-y-auto mb-4 border border-slate-200 rounded-xl p-2 bg-slate-50 custom-scroll">
                <div id="bulk-loader" class="text-center py-4 text-indigo-600 font-bold text-sm hidden flex flex-col items-center gap-2"><div class="loader"></div> Обробка...</div>
                <ul id="bulk-preview-list" class="space-y-2"></ul>
            </div>
            <div class="flex gap-3 mt-auto">
                <button id="btn-bulk-process" onclick="processBulkText()" class="flex-1 bg-slate-800 text-white py-3 rounded-xl font-bold transition">Обробити</button>
                <button id="btn-bulk-save" onclick="saveBulkWords()" class="hidden flex-1 bg-emerald-500 text-white py-3 rounded-xl font-bold transition">Зберегти</button>
            </div>
        </div>
    </div>

    <header class="bg-white border-b border-slate-200 px-4 py-3 flex justify-between items-center sticky-header shadow-sm h-[60px]">
        <h1 class="font-bold text-indigo-600 text-xl tracking-tight flex items-center gap-2">
            <span class="text-2xl">🌌</span> LinguaSpace
        </h1>
        <button onclick="openSyncModal()" class="text-xs font-bold text-indigo-700 bg-indigo-50 px-3 py-2 rounded-lg border border-indigo-100 transition shadow-sm flex items-center gap-1.5">
            <span>Профіль 🔑</span>
        </button>
    </header>

    <nav class="border-b border-slate-200 sticky-nav shadow-sm">
        <div class="max-w-3xl mx-auto flex justify-between items-center text-sm font-bold text-slate-500">
            <button onclick="switchTab('dictionary')" id="tab-dictionary" class="flex-1 py-3.5 text-indigo-600 border-b-[3px] border-indigo-600 transition-colors">Словник</button>
            <button onclick="switchTab('library')" id="tab-library" class="flex-1 py-3.5 hover:text-indigo-500 transition-colors border-b-[3px] border-transparent">Бібліотека</button>
            <button onclick="switchTab('training')" id="tab-training" class="flex-1 py-3.5 hover:text-indigo-500 transition-colors border-b-[3px] border-transparent">Тренування</button>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 pt-5">
        
        <section id="view-dictionary" class="fade-in block">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 mb-4">
                <div class="flex flex-col gap-3">
                    <div class="flex flex-col sm:flex-row gap-3 relative">
                        <div class="flex-1 relative">
                            <input type="text" id="manual-word" placeholder="Слово (Enter для перекладу)" class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-base">
                            <button onclick="autoTranslateManual()" class="absolute right-2 top-2 p-1.5 text-indigo-500 hover:bg-indigo-100 rounded-lg transition" title="Перекласти">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129" /></svg>
                            </button>
                        </div>
                        <div class="flex-1 relative">
                            <input type="text" id="manual-trans" placeholder="Переклад (Enter для збереження)" class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-base bg-white" autocomplete="off">
                            <div id="trans-dropdown" class="hidden absolute top-full left-0 right-0 mt-1 bg-white border border-slate-200 rounded-xl shadow-lg z-50 max-h-48 overflow-y-auto custom-scroll">
                                <ul id="trans-options-list" class="flex flex-col p-1"></ul>
                            </div>
                        </div>
                    </div>
                    <button onclick="addWordManual()" id="btn-add-manual" class="w-full bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 transition shadow-sm active:scale-95 text-base">Додати до словника</button>
                </div>
            </div>

            <div class="flex justify-between items-center mb-4 px-1">
                <div id="dict-header-controls" class="flex-1 flex items-center gap-3">
                    <!-- Буде заповнено через JS -->
                </div>
                <div class="flex gap-2">
                    <button onclick="openBulkModal()" class="text-sm font-bold bg-white shadow-sm border border-slate-200 px-3 py-1.5 rounded-lg hover:bg-slate-50 transition flex items-center gap-1">📥 Імпорт</button>
                    <button onclick="exportWordsJSON()" class="text-sm font-bold bg-white shadow-sm border border-slate-200 px-3 py-1.5 rounded-lg hover:bg-slate-50 transition flex items-center gap-1">⚙️ Експорт</button>
                </div>
            </div>
            
            <div id="dict-folder-tags" class="flex gap-2 overflow-x-auto custom-scroll pb-3 mb-2"></div>
            <div id="dict-sub-folder-tags" class="hidden gap-2 overflow-x-auto custom-scroll pb-3 mb-2 border-t border-slate-100 pt-3"></div>
            
            <div id="words-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4"></div>
        </section>

        <section id="view-library" class="fade-in hidden">
            <!-- List Mode -->
            <div id="library-list-view" class="block">
                <button onclick="showAddTextForm()" class="w-full bg-white border-2 border-dashed border-indigo-300 text-indigo-600 font-bold py-5 rounded-2xl mb-5 hover:bg-indigo-50 transition shadow-sm text-lg flex items-center justify-center gap-2">
                    <span class="text-2xl">+</span> Додати новий матеріал
                </button>
                <div id="materials-grid" class="space-y-4"></div>
            </div>

            <!-- Add / Edit Mode -->
            <div id="library-add-view" class="hidden bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex gap-2 mb-4 border-b border-slate-100 pb-2">
                    <button onclick="setAddMode('text')" id="tab-add-text" class="px-4 py-2 bg-indigo-50 text-indigo-700 font-bold rounded-lg text-sm transition">Текст</button>
                    <button onclick="setAddMode('url')" id="tab-add-url" class="px-4 py-2 text-slate-500 font-bold rounded-lg hover:bg-slate-50 text-sm transition">Стаття (URL)</button>
                    <button onclick="setAddMode('yt')" id="tab-add-yt" class="px-4 py-2 text-slate-500 font-bold rounded-lg hover:bg-slate-50 text-sm transition">YouTube + Субтитри</button>
                </div>

                <input type="text" id="material-title" placeholder="Назва матеріалу" class="w-full p-2 mb-4 border-b-2 border-slate-200 focus:border-indigo-500 outline-none font-bold text-xl text-slate-800 bg-transparent">
                
                <!-- Tab: Text -->
                <div id="mode-text-area" class="block">
                    <textarea id="material-content" rows="8" class="w-full p-4 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-base mb-4 resize-none leading-relaxed custom-scroll" placeholder="Оригінальний текст (або скрипт відео)..."></textarea>
                </div>

                <!-- Tab: URL (Jina AI Parser) -->
                <div id="mode-url-area" class="hidden">
                    <div class="flex gap-2 mb-4">
                        <input type="url" id="material-url" placeholder="https://..." class="flex-1 p-3 border border-slate-300 rounded-xl outline-none focus:border-indigo-500 text-sm">
                        <button onclick="fetchArticleText(event)" class="bg-indigo-100 text-indigo-700 px-4 rounded-xl font-bold hover:bg-indigo-200 text-sm whitespace-nowrap">Витягнути текст</button>
                    </div>
                </div>

                <!-- Tab: YouTube -->
                <div id="mode-yt-area" class="hidden mb-4">
                    <div class="flex gap-2 mb-3">
                        <input type="url" id="material-yt-url" placeholder="Посилання на YouTube" class="flex-1 p-3 border border-slate-300 rounded-xl outline-none focus:border-indigo-500 text-sm">
                        <button onclick="loadYTIframeForPreview()" class="bg-indigo-100 text-indigo-700 px-4 rounded-xl font-bold hover:bg-indigo-200 text-sm whitespace-nowrap">Додати відео</button>
                    </div>
                    <div id="yt-preview-container" class="w-full aspect-video bg-black rounded-xl mb-3 hidden overflow-hidden shadow-inner flex items-center justify-center text-slate-500 text-sm"></div>
                    
                    <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 mt-4 relative">
                        <h4 class="font-bold text-slate-700 mb-3 text-sm flex justify-between items-center">
                            <span>Субтитри (.srt)</span>
                        </h4>
                        
                        <div id="yt-dropzone" class="border-2 border-dashed border-indigo-300 bg-indigo-50/50 rounded-xl p-6 text-center hover:bg-indigo-50 transition cursor-pointer mb-3" onclick="document.getElementById('yt-sub-file').click()">
                            <p class="text-indigo-700 font-bold text-sm">Перетягніть файл .srt сюди<br><span class="text-xs font-normal text-slate-500">або натисніть, щоб вибрати</span></p>
                            <input type="file" id="yt-sub-file" accept=".srt,.txt" class="hidden" onchange="handleSubFileUpload(event)">
                        </div>

                        <button onclick="document.getElementById('yt-manual-area').classList.toggle('hidden')" class="text-xs text-indigo-600 font-bold hover:underline mb-2">Або вставити текст вручну ↓</button>
                        
                        <div id="yt-manual-area" class="hidden">
                            <textarea id="yt-sub-raw" rows="4" placeholder="1\n00:00:05,000 --> 00:00:08,000\nHello, world!" class="w-full p-3 border border-slate-300 rounded-xl outline-none focus:border-indigo-500 text-xs font-mono custom-scroll"></textarea>
                        </div>
                    </div>
                </div>

                <div class="flex gap-3 mt-4">
                    <button id="btn-save-material" onclick="saveMaterial()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold text-lg shadow-sm transition">Зберегти матеріал</button>
                    <button onclick="cancelAddMaterial()" class="px-6 bg-slate-100 text-slate-700 py-3 rounded-xl font-bold border border-slate-200 transition">Скасувати</button>
                </div>
            </div>

            <!-- Read Mode -->
            <div id="library-read-view" class="hidden h-full flex flex-col relative">
                <div class="flex items-center gap-3 mb-4 sticky top-0 bg-slate-50 z-50 py-2">
                    <button onclick="closeReader()" class="text-slate-600 bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-200 hover:bg-slate-50 font-bold flex items-center gap-1 active:scale-95 transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> Назад
                    </button>
                    <h2 id="reader-title" class="font-bold text-lg text-slate-800 truncate flex-1"></h2>
                </div>
                
                <!-- Відео контейнер (буде ставати PiP при скролі) -->
                <div id="reader-yt-wrapper" class="w-full aspect-video bg-black rounded-xl mb-4 hidden shadow-md overflow-hidden relative transition-all z-[100]">
                    <div id="reader-yt-player" class="w-full h-full"></div>
                </div>
                
                <div id="reader-content-wrapper" class="bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-slate-200 flex-1 overflow-y-auto custom-scroll relative">
                    <div id="reader-content" class="text-reader text-lg leading-[2]"></div>
                </div>
            </div>
        </section>

        <section id="view-training" class="fade-in hidden">
            
            <div id="train-hub-screen" class="block mt-4">

                <!-- Налаштування тренувань -->
                <div class="bg-slate-100 p-4 rounded-xl mb-6 border border-slate-200 grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="font-bold text-slate-600 text-xs uppercase mb-1 block">Папка/Матеріал:</label>
                        <select id="train-folder-select" class="w-full p-2.5 border border-slate-300 rounded-lg bg-white font-bold text-slate-800 outline-none text-sm cursor-pointer shadow-sm">
                            <option value="all">Усі матеріали</option>
                            <!-- Динамічні опції -->
                        </select>
                    </div>
                    <div>
                        <label class="font-bold text-slate-600 text-xs uppercase mb-1 block">Слів у Брейнштормі:</label>
                        <select id="bs-word-count" class="w-full p-2.5 border border-slate-300 rounded-lg bg-white font-bold text-indigo-700 outline-none text-sm cursor-pointer shadow-sm">
                            <option value="4">4 слова</option>
                            <option value="6" selected>6 слів</option>
                            <option value="10">10 слів</option>
                            <option value="15">15 слів</option>
                            <option value="20">20 слів</option>
                        </select>
                    </div>
                </div>

                <div class="flex flex-col gap-3 mb-6">
                    <button onclick="startSession('all')" class="w-full bg-indigo-600 text-white py-5 rounded-2xl shadow-md hover:bg-indigo-700 transition active:scale-95 text-center font-bold text-xl relative overflow-hidden group">
                        <div class="absolute right-0 top-0 bottom-0 w-16 bg-indigo-500 opacity-20 skew-x-12 transform translate-x-4 group-hover:translate-x-0 transition-transform"></div>
                        🧠 Почати Brainstorm
                    </button>
                    <!-- Кнопка Повторення вивчених -->
                    <button onclick="startSession('review')" class="w-full bg-emerald-50 text-emerald-700 border border-emerald-200 py-3 rounded-xl hover:bg-emerald-100 transition active:scale-95 text-center font-bold text-sm shadow-sm">
                        🔄 Повторити вивчені (4/4)
                    </button>

                <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-3 px-1">Окремі вправи (по 10 слів)</h3>
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-6">
                    <button onclick="startSession('word-trans')" class="bg-white border border-slate-200 p-4 rounded-2xl shadow-sm hover:border-indigo-400 transition text-center aspect-square group">
                        <div class="text-5xl mb-3 group-hover:scale-110 transition-transform">🇬🇧➡️🇺🇦</div><h4 class="font-bold text-slate-700 text-sm">Слово → Переклад</h4>
                    </button>
                    <button onclick="startSession('trans-word')" class="bg-white border border-slate-200 p-4 rounded-2xl shadow-sm hover:border-violet-400 transition text-center aspect-square group">
                        <div class="text-5xl mb-3 group-hover:scale-110 transition-transform">🇬🇧⬅️🇺🇦</div><h4 class="font-bold text-slate-700 text-sm">Переклад → Слово</h4>
                    </button>
                    <button onclick="startSession('constructor')" class="bg-white border border-slate-200 p-4 rounded-2xl shadow-sm hover:border-fuchsia-400 transition text-center aspect-square group">
                        <div class="text-5xl mb-3 group-hover:scale-110 transition-transform">🔠🔄</div><h4 class="font-bold text-slate-700 text-sm">Конструктор</h4>
                    </button>
                    <button onclick="startSession('typing')" class="bg-white border border-slate-200 p-4 rounded-2xl shadow-sm hover:border-emerald-400 transition text-center aspect-square group">
                        <div class="text-5xl mb-3 group-hover:scale-110 transition-transform">⌨️✍️</div><h4 class="font-bold text-slate-700 text-sm">Написання</h4>
                    </button>
                    <button onclick="startSession('listening')" class="bg-white border border-slate-200 p-4 rounded-2xl shadow-sm hover:border-sky-400 transition text-center aspect-square group">
                        <div class="text-5xl mb-3 group-hover:scale-110 transition-transform">🎧👂</div><h4 class="font-bold text-slate-700 text-sm">Аудіювання</h4>
                    </button>
                    <button onclick="startContextSession()" class="bg-white border border-slate-200 p-4 rounded-2xl shadow-sm hover:border-amber-400 transition text-center aspect-square group">
                        <div class="text-5xl mb-3 group-hover:scale-110 transition-transform">📝🕵️</div><h4 class="font-bold text-slate-700 text-sm">Контекст</h4>
                    </button>
                </div>
            </div>

            <!-- Workspace -->
            <div id="bs-workspace" class="hidden mt-2 relative">
                <button onclick="toggleMute()" id="btn-global-mute" class="absolute -top-10 right-0 p-2 bg-slate-100 hover:bg-slate-200 rounded-full shadow-sm border border-slate-200 z-10 text-xl transition-colors">🔊</button>

                <div class="flex justify-between items-center mb-2 px-1">
                    <span id="bs-overall-stage" class="text-sm font-bold text-slate-500 uppercase tracking-wider"></span>
                    <span id="bs-word-counter" class="text-sm font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-md"></span>
                </div>
                <div class="w-full bg-slate-200 rounded-full h-3 mb-6 overflow-hidden border border-slate-200">
                    <div id="bs-progress-bar" class="bg-indigo-500 h-full rounded-full transition-all duration-300 ease-out" style="width: 0%"></div>
                </div>

                <div class="bg-white p-5 sm:p-8 rounded-2xl shadow-xl border border-slate-100 text-center relative overflow-hidden flex flex-col min-h-[300px]">
                    <div id="bs-interactive-area" class="flex-1 flex flex-col justify-center relative z-10 w-full"></div>
                    <div id="bs-feedback" class="mt-4 min-h-[32px] flex items-center justify-center font-bold text-lg relative z-10"></div>
                    
                    <div id="bs-success-reveal" class="hidden mt-4 bg-indigo-50/50 p-4 rounded-xl flex flex-col sm:flex-row items-center gap-4 text-left border border-indigo-100 fade-in z-10">
                        <img id="bs-success-img" class="w-24 h-24 sm:w-20 sm:h-20 rounded-lg object-cover shadow-sm bg-slate-200 flex-shrink-0">
                        <div>
                            <h4 class="font-bold text-indigo-800 text-lg mb-1" id="bs-success-word"></h4>
                            <p class="text-sm text-slate-600 font-medium" id="bs-success-context"></p>
                        </div>
                    </div>

                    <button id="bs-btn-next" onclick="nextBrainstormStep()" class="mt-5 w-full bg-slate-800 text-white py-4 rounded-xl font-bold text-lg hidden active:scale-95 shadow-md relative z-10 transition">Далі (Enter)</button>
                </div>
                <button onclick="endSession()" class="mt-8 text-sm text-slate-400 font-bold w-full text-center hover:text-slate-600 transition">× Перервати тренування</button>
            </div>

            <div id="bs-results" class="hidden bg-white p-8 rounded-2xl shadow-xl border border-slate-100 text-center mt-6">
                <div class="text-6xl mb-4" id="bs-result-emoji">🏆</div>
                <h2 class="text-2xl font-bold text-slate-800 mb-2" id="bs-result-title">Завершено!</h2>
                <div id="bs-results-list" class="text-left bg-slate-50 p-5 rounded-xl mb-8 max-h-60 overflow-y-auto space-y-3 border border-slate-200 custom-scroll"></div>
                <button onclick="endSession()" class="bg-indigo-600 text-white px-8 py-4 rounded-xl font-bold text-lg w-full shadow-lg active:scale-95 transition">До вибору тренувань</button>
            </div>
        </section>
    </main>

    <div id="inline-popup" class="hidden absolute z-[100] bg-white rounded-xl shadow-2xl border border-slate-200 p-4 w-72 transform -translate-x-1/2 transition-opacity">
        <div class="flex justify-between items-start mb-2">
            <strong id="inline-popup-word" class="text-lg text-indigo-700 font-bold"></strong>
            <button onclick="closeInlinePopup()" class="text-slate-400 hover:text-slate-600 font-bold text-xl">&times;</button>
        </div>
        <div id="inline-popup-loader" class="hidden text-indigo-500 font-bold text-xs flex items-center gap-2 mb-2"><div class="loader w-3 h-3"></div> Шукаємо...</div>
        <input type="text" id="inline-popup-trans-input" class="w-full mb-2 p-2 border border-slate-200 rounded-lg outline-none focus:border-indigo-600 text-base font-bold text-slate-800 bg-slate-50" placeholder="Натисніть Enter">
        <div id="inline-trans-dropdown" class="mb-3 max-h-32 overflow-y-auto custom-scroll border border-slate-100 rounded-lg hidden bg-white">
            <ul id="inline-trans-options-list" class="flex flex-col"></ul>
        </div>
        <button onclick="saveWordFromInlinePopup()" id="inline-popup-save-btn" class="w-full bg-emerald-500 text-white py-2 rounded-lg font-bold text-sm shadow-sm hover:bg-emerald-600 active:scale-95 transition hidden">Зберегти (Enter)</button>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyARJpUlEfJ53Q1a9qd9fyYC6gmHY58AKfI",
            authDomain: "my-english-vocab-training.firebaseapp.com",
            projectId: "my-english-vocab-training",
            storageBucket: "my-english-vocab-training.firebasestorage.app"
        };
        const UNSPLASH_ACCESS_KEY = "bzl5TrYKEiXRN9HeLAdi5xIdgiN1PxviUgfqIjgDlsE";
        
        const LOCAL_UID_KEY = 'linguaspace_active_uid';
        const DEFAULT_SHARED_UID = "linguaspace"; 

        const SRS_INTERVALS = [0, 3*60*60*1000, 12*60*60*1000, 24*60*60*1000, 72*60*60*1000];
        const MAX_SRS_LEVEL = 4;

        let app, auth, db, activeUid = null;
        let vocabulary = [], materials = [], currentMaterial = null;
        let unsubscribeWords = null, unsubscribeMaterials = null;
        let isGlobalAudioMuted = false;
        
        // Стан для відображення папок
        let currentDictTab = 'all'; // 'all', 'manual', 'import', 'materials'
        let currentMaterialFilter = null; 

        window.showModal = (text, confirmMode = false, onConfirm = null) => {
            document.getElementById('custom-modal').classList.remove('hidden');
            document.getElementById('modal-text').textContent = text;
            const btnCancel = document.getElementById('modal-btn-cancel');
            btnCancel.classList.toggle('hidden', !confirmMode);
            document.getElementById('modal-btn-ok').onclick = () => { document.getElementById('custom-modal').classList.add('hidden'); if(onConfirm) onConfirm(); };
            btnCancel.onclick = () => document.getElementById('custom-modal').classList.add('hidden');
        };

        window.imgError = (img) => { img.onerror = null; img.src = "https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=400&auto=format&fit=crop&q=60"; };

        function setSystemStatus(msg, type = 'info') {
            const status = document.getElementById('system-status');
            status.textContent = msg;
            status.className = `text-white text-center py-1.5 text-xs font-bold uppercase tracking-wider transition-all duration-500 shadow-md z-[100] relative ${type === 'success' ? 'bg-emerald-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500'}`;
            if(type === 'success') { setTimeout(() => { status.style.transform = "translateY(-100%)"; }, 2500); } 
            else { status.style.transform = "translateY(0)"; }
        }

        try {
            app = initializeApp(firebaseConfig); auth = getAuth(app); db = getFirestore(app);
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    const savedUid = localStorage.getItem(LOCAL_UID_KEY);
                    activeUid = savedUid ? savedUid : DEFAULT_SHARED_UID; 
                    localStorage.setItem(LOCAL_UID_KEY, activeUid);
                    setSystemStatus("Підключено до хмари ☁️", "success");
                    loadData();
                } else { signInAnonymously(auth).catch(() => setSystemStatus("Помилка авторизації", "error")); }
            });
        } catch (e) { setSystemStatus("Критична помилка Firebase", "error"); }

        function loadData() {
            if (!activeUid) return;
            if (unsubscribeWords) unsubscribeWords(); if (unsubscribeMaterials) unsubscribeMaterials();

            unsubscribeWords = onSnapshot(collection(db, 'users', activeUid, 'words'), (snap) => {
                vocabulary = []; snap.forEach(d => vocabulary.push({ id: d.id, ...d.data() }));
                vocabulary.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                
                renderDictionary(); updateTrainFolderSelect();
            });

            unsubscribeMaterials = onSnapshot(collection(db, 'users', activeUid, 'materials'), (snap) => {
                materials = []; snap.forEach(d => materials.push({ id: d.id, ...d.data() }));
                materials.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                renderMaterials();
            });
        }

        // --- Utils & Translation ---
        function getSrsInfo(word) {
            const level = word.srsLevel || 0; const nextTime = word.nextReviewTime || 0;
            const now = Date.now(); return { level, nextTime, isReady: level === 0 || now >= nextTime };
        }

        async function getImageUrl(word) {
            const fallback = `https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=400&auto=format&fit=crop&q=60`;
            try {
                const res = await fetch(`https://api.unsplash.com/search/photos?query=${encodeURIComponent(word.split(' ')[0])}&per_page=1&client_id=${UNSPLASH_ACCESS_KEY}`);
                const data = await res.json();
                if(data.results && data.results.length > 0) return data.results[0].urls.regular;
            } catch(e) {}
            return fallback;
        }

        async function fetchTranslationOptions(query) {
            try {
                const res = await fetch("https://translator-proxy.v09052014.workers.dev/", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ text: query.toLowerCase(), from: "en", to: "uk" }) });
                const data = await res.json();
                if (data.data?.translations?.length) return [{ text: data.data.translations[0].translatedText.toLowerCase(), score: 1 }];
            } catch (e) {} return null;
        }

        // --- Folders (Dictionary) ---
        window.setDictTab = (tab) => { currentDictTab = tab; currentMaterialFilter = null; renderDictionary(); };
        window.setDictMaterial = (matName) => { currentMaterialFilter = matName; renderDictionary(); };

        function renderDictionary() {
            const grid = document.getElementById('words-grid');
            const tagsContainer = document.getElementById('dict-folder-tags');
            const subTagsContainer = document.getElementById('dict-sub-folder-tags');
            
            // Заповнення стрічки головних тегів
            let tagsHtml = `
                <button onclick="setDictTab('all')" class="px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap transition border ${currentDictTab === 'all' ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}">Усі слова (${vocabulary.length})</button>
                <button onclick="setDictTab('manual')" class="px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap transition border flex items-center gap-1.5 ${currentDictTab === 'manual' ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}"><span>✍️</span> Словник</button>
                <button onclick="setDictTab('import')" class="px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap transition border flex items-center gap-1.5 ${currentDictTab === 'import' ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}"><span>📥</span> Імпорт</button>
                <button onclick="setDictTab('materials')" class="px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap transition border flex items-center gap-1.5 ${currentDictTab === 'materials' ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}"><span>📚</span> Матеріали</button>
            `;
            tagsContainer.innerHTML = tagsHtml;

            const materialSources = [...new Set(vocabulary.map(w => w.source).filter(s => s && s !== 'Словник' && s !== 'Імпорт'))];

            // Якщо вибрана вкладка "Матеріали" і ще не вибрано конкретний матеріал
            if (currentDictTab === 'materials' && !currentMaterialFilter) {
                subTagsContainer.classList.add('hidden');
                grid.className = "grid grid-cols-1 sm:grid-cols-2 gap-4";
                if(materialSources.length === 0) { grid.innerHTML = '<p class="text-slate-500 font-bold col-span-full">У вас ще немає слів з матеріалів.</p>'; return; }
                
                grid.innerHTML = materialSources.map(src => {
                    const count = vocabulary.filter(w => w.source === src).length;
                    return `
                    <div onclick="setDictMaterial('${src}')" class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 cursor-pointer hover:border-indigo-400 hover:shadow-md transition flex items-center gap-4 group">
                        <div class="text-4xl">📁</div>
                        <div class="flex-1 min-w-0">
                            <h3 class="font-bold text-slate-800 text-lg truncate group-hover:text-indigo-600 transition">${src}</h3>
                            <p class="text-sm font-bold text-slate-500">${count} слів</p>
                        </div>
                    </div>`;
                }).join('');
                return;
            }

            // Рендер конкретних слів
            subTagsContainer.classList.add('hidden');
            let filtered = vocabulary;
            if (currentDictTab === 'manual') filtered = vocabulary.filter(w => w.source === 'Словник');
            else if (currentDictTab === 'import') filtered = vocabulary.filter(w => w.source === 'Імпорт');
            else if (currentDictTab === 'materials' && currentMaterialFilter) {
                subTagsContainer.classList.remove('hidden');
                subTagsContainer.innerHTML = `<button onclick="setDictTab('materials')" class="px-3 py-1.5 rounded-lg text-xs font-bold whitespace-nowrap transition border bg-slate-100 text-slate-600 border-slate-200 hover:bg-slate-200 flex items-center gap-1">← Назад до папок</button><span class="text-indigo-600 font-bold flex items-center text-sm px-2 truncate">${currentMaterialFilter}</span>`;
                filtered = vocabulary.filter(w => w.source === currentMaterialFilter);
            }
            
            grid.className = "grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4";
            grid.innerHTML = filtered.map(item => {
                const srs = getSrsInfo(item);
                return `
                <div onclick="openEditModal('${item.id}')" class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col relative group cursor-pointer hover:shadow-md hover:border-indigo-300 transition h-40">
                    <img src="${item.imageUrl}" class="w-full h-20 object-cover bg-slate-50 flex-shrink-0 border-b border-slate-100" onerror="imgError(this)">
                    <div class="p-3 flex-1 flex flex-col justify-center min-w-0 bg-white pr-10 relative">
                        <strong class="text-slate-800 text-lg leading-tight truncate font-bold">${item.word}</strong>
                        <span class="text-indigo-600 text-sm font-bold truncate">${item.translation}</span>
                        <button onclick="showSrsInfo('${item.id}', event)" class="absolute right-2 top-1/2 -translate-y-1/2 p-1 hover:bg-slate-50 rounded-full transition">${getSrsSvg(srs.level, srs.isReady)}</button>
                    </div>
                    <button onclick="deleteWord('${item.id}', event)" class="absolute top-2 right-2 w-7 h-7 bg-white rounded-full shadow-md text-rose-500 font-bold opacity-0 group-hover:opacity-100 flex items-center justify-center transition border hover:bg-rose-50">&times;</button>
                </div>`
            }).join('');
        }

        // --- Modals & Global actions ---
        window.openSyncModal = () => { document.getElementById('sync-current-uid').value = activeUid; document.getElementById('sync-modal').classList.remove('hidden'); };
        window.closeSyncModal = () => document.getElementById('sync-modal').classList.add('hidden');
        window.copyUid = () => { document.getElementById('sync-current-uid').select(); document.execCommand('copy'); window.showModal("ID скопійовано!"); };
        window.applyUid = () => { const n = document.getElementById('sync-input-uid').value.trim(); if(n.length>4){ activeUid=n; localStorage.setItem(LOCAL_UID_KEY, activeUid); loadData(); closeSyncModal(); window.showModal("Синхронізовано."); }};
        window.resetUid = () => { activeUid = DEFAULT_SHARED_UID; localStorage.setItem(LOCAL_UID_KEY, activeUid); loadData(); closeSyncModal(); window.showModal("Повернуто спільний ID."); };

        window.autoTranslateManual = async () => {
            const word = document.getElementById('manual-word').value.trim(); if(!word) return;
            const inputTrans = document.getElementById('manual-trans'), dropdown = document.getElementById('trans-dropdown');
            inputTrans.value = 'Шукаємо...'; dropdown.classList.add('hidden');
            const options = await fetchTranslationOptions(word);
            if(options) {
                inputTrans.value = options[0].text;
                document.getElementById('trans-options-list').innerHTML = options.map(opt => `<li onclick="selectTranslation('${opt.text.replace(/'/g, "\\'")}')" class="p-3 hover:bg-indigo-50 cursor-pointer border-b border-slate-100 flex justify-between"><span class="font-bold text-slate-800">${opt.text}</span></li>`).join('');
                dropdown.classList.remove('hidden');
            } else { inputTrans.value = 'Не знайдено'; }
        };
        window.selectTranslation = (text) => { document.getElementById('manual-trans').value = text; document.getElementById('trans-dropdown').classList.add('hidden'); };

        window.addWordManual = async () => {
            if(!activeUid) return;
            const word = document.getElementById('manual-word').value.trim(); 
            const trans = document.getElementById('manual-trans').value.trim();
            if(!word || !trans || trans === 'Шукаємо...') return;
            const btn = document.getElementById('btn-add-manual'); const orig = btn.textContent; btn.disabled = true; btn.textContent = "...";
            try {
                const imgUrl = await getImageUrl(word);
                await addDoc(collection(db, 'users', activeUid, 'words'), { word, translation: trans, imageUrl: imgUrl, context: "", source: "Словник", createdAt: serverTimestamp(), srsLevel: 0, nextReviewTime: Date.now() });
                document.getElementById('manual-word').value = ''; document.getElementById('manual-trans').value = ''; document.getElementById('manual-word').focus();
            } catch (err) {} finally { btn.disabled = false; btn.textContent = orig; }
        };

        window.deleteWord = (id, e) => { e.stopPropagation(); window.showModal("Видалити слово?", true, async () => await deleteDoc(doc(db, 'users', activeUid, 'words', id))); };
        window.openEditModal = (id) => {
            const word = vocabulary.find(v => v.id === id); if(!word) return;
            document.getElementById('edit-word-id').value = id; document.getElementById('edit-word-en').value = word.word;
            document.getElementById('edit-word-uk').value = word.translation; document.getElementById('edit-word-ctx').value = word.context || '';
            document.getElementById('edit-word-modal').classList.remove('hidden');
        };
        window.closeEditModal = () => document.getElementById('edit-word-modal').classList.add('hidden');
        window.saveEditedWord = async () => {
            const id = document.getElementById('edit-word-id').value, word = document.getElementById('edit-word-en').value.trim(), translation = document.getElementById('edit-word-uk').value.trim(), context = document.getElementById('edit-word-ctx').value.trim();
            if(word && translation) { await updateDoc(doc(db, 'users', activeUid, 'words', id), { word, translation, context }); closeEditModal(); }
        };
        
        window.showSrsInfo = (id, e) => {
            e.stopPropagation(); const word = vocabulary.find(v => v.id === id); if(!word) return;
            const info = getSrsInfo(word);
            document.getElementById('srs-info-word-id').value = id;
            document.getElementById('srs-info-word').textContent = word.word;
            document.getElementById('srs-info-level').textContent = `Вивчено: ${info.level}/${MAX_SRS_LEVEL}`;
            const btnReset = document.getElementById('srs-btn-reset');
            
            if(info.level >= MAX_SRS_LEVEL) {
                document.getElementById('srs-info-emoji').textContent = "🏆"; document.getElementById('srs-info-time').textContent = "Слово повністю вивчене!";
                btnReset.classList.remove('hidden');
            } else {
                document.getElementById('srs-info-emoji').textContent = info.isReady ? "✅" : "⏳";
                const ms = info.nextTime - Date.now();
                document.getElementById('srs-info-time').textContent = ms <= 0 ? "Готово до тренування!" : `Наступне через ${Math.floor(ms/(1000*60*60))}г ${Math.floor((ms%(1000*60*60))/(1000*60))}хв`;
                btnReset.classList.add('hidden');
            }
            document.getElementById('srs-info-modal').classList.remove('hidden');
        };
        window.closeSrsModal = (e) => { if(e.target.id === 'srs-info-modal') document.getElementById('srs-info-modal').classList.add('hidden'); };
        
        window.resetWordProgress = async () => {
            const id = document.getElementById('srs-info-word-id').value;
            if(!id) return;
            try {
                await updateDoc(doc(db, 'users', activeUid, 'words', id), { srsLevel: 0, nextReviewTime: Date.now() });
                document.getElementById('srs-info-modal').classList.add('hidden');
                window.showModal("Прогрес скинуто. Слово знову в черзі!");
            } catch(e) {}
        };

        function parseCleanSRT(raw) {
            const blocks = raw.replace(/\r\n/g, '\n').split('\n\n'); const subs = [];
            const timeToSeconds = (t) => { const p = t.replace(',', '.').split(':'); return p.length===3 ? (parseFloat(p[0])*3600)+(parseFloat(p[1])*60)+parseFloat(p[2]) : 0; };
            blocks.forEach(block => {
                const lines = block.trim().split('\n'); const timeIndex = lines.findIndex(l => l.includes('-->'));
                if(timeIndex !== -1 && lines.length > timeIndex + 1) {
                    const timeParts = lines[timeIndex].split('-->'); const start = timeToSeconds(timeParts[0].trim()); const end = timeToSeconds(timeParts[1].trim());
                    const cleanText = lines.slice(timeIndex + 1).join(' ').replace(/<[^>]*>/g, '').replace(/\{[^}]*\}/g, '').trim();
                    if(cleanText && !isNaN(start)) subs.push({ start, end, text: cleanText });
                }

                    let lvl = w[`srs_${mode}_Level`] || 0;
                    let nxt = w[`srs_${mode}_NextTime`] || 0;
                    return lvl < MAX_SRS_LEVEL && Date.now() >= nxt;
                });
                if(pool.length === 0) {
                    let fallbackPool = folder === 'all' ? vocabulary : vocabulary.filter(w => (w.source || "Інше") === folder);
                    if(mode === 'context') fallbackPool = fallbackPool.filter(w => w.context && w.context.trim().length > 5);
                    pool = fallbackPool.filter(w => !(w[`srs_${mode}_Level`]));
                }
            }
            
            if(pool.length === 0) return window.showModal("Наразі немає слів для повторення в цьому режимі. Зачекайте або додайте нові слова.");

            activeSessionMode = mode;
            bsWords = pool.sort(() => 0.5 - Math.random()).slice(0, Math.min(pool.length, reqCount));
            bsCurrentWordIdx = 0; 
            
            const stagesForMode = MODE_STAGES[mode]; bsCurrentStage = stagesForMode[0]; 
            bsTotalSteps = bsWords.length * stagesForMode.length; bsCompletedSteps = 0;

            document.getElementById('train-hub-screen').classList.add('hidden'); document.getElementById('bs-results').classList.add('hidden'); document.getElementById('bs-workspace').classList.remove('hidden');
            updateBsProgress(); renderBsStage();
        };

        window.startContextSession = () => {
            window.startSession('context');
        }

        window.endSession = () => { document.getElementById('bs-workspace').classList.add('hidden'); document.getElementById('bs-results').classList.add('hidden'); document.getElementById('train-hub-screen').classList.remove('hidden'); window.speechSynthesis.cancel(); document.removeEventListener('keydown', handleConstructorKeyboard); document.removeEventListener('keydown', handleGlobalKeyboard); };

        function updateBsProgress() { document.getElementById('bs-progress-bar').style.width = `${(bsCompletedSteps / bsTotalSteps) * 100}%`; document.getElementById('bs-overall-stage').textContent = STAGE_NAMES[bsCurrentStage]; document.getElementById('bs-word-counter').textContent = `${bsCurrentWordIdx + 1} / ${bsWords.length}`; }

        window.nextBrainstormStep = () => {
            bsCompletedSteps++; bsCurrentWordIdx++;
            if (bsCurrentWordIdx >= bsWords.length) {
                bsCurrentWordIdx = 0; const stages = MODE_STAGES[activeSessionMode]; const currentStageIndex = stages.indexOf(bsCurrentStage);
                if(currentStageIndex + 1 < stages.length) bsCurrentStage = stages[currentStageIndex + 1]; else return finishBrainstorm(); 
            }
            updateBsProgress(); renderBsStage();
        };

        async function finishBrainstorm() {
            document.getElementById('bs-workspace').classList.add('hidden'); 
            
            try {
                if(activeSessionMode === 'all') { // Основний Брейншторм
                    for(let w of bsWords) {
                        let newLevel = Math.min((w.srsLevel || 0) + 1, MAX_SRS_LEVEL);
                        await updateDoc(doc(db, 'users', activeUid, 'words', w.id), { srsLevel: newLevel, nextReviewTime: Date.now() + SRS_INTERVALS[newLevel] });
                    }
                } else if (activeSessionMode !== 'review') { // Окремі вправи (свій незалежний SRS)
                    for(let w of bsWords) {
                        let newLevel = Math.min((w[`srs_${activeSessionMode}_Level`] || 0) + 1, MAX_SRS_LEVEL);
                        await updateDoc(doc(db, 'users', activeUid, 'words', w.id), { 
                            [`srs_${activeSessionMode}_Level`]: newLevel, 
                            [`srs_${activeSessionMode}_NextTime`]: Date.now() + SRS_INTERVALS[newLevel] 
                        });
                    }
                }
            } catch(e) { console.error(e); }

            document.getElementById('bs-results').classList.remove('hidden');
            document.getElementById('bs-results-list').innerHTML = bsWords.map(w => `<div class="border-b border-slate-200 pb-2 mb-2 flex justify-between items-center"><span class="font-bold text-slate-800 text-lg">${w.word}</span><span class="text-indigo-600 font-bold text-sm">${w.translation}</span></div>`).join('');
        }

        function handleGlobalKeyboard(e) {
            const btnNext = document.getElementById('bs-btn-next');
            if(e.key === 'Enter' && !btnNext.classList.contains('hidden')) { e.preventDefault(); e.stopPropagation(); btnNext.click(); return; }
            if (['1', '2', '3', '4'].includes(e.key) && (bsCurrentStage === 1 || bsCurrentStage === 4)) {
                const buttons = document.querySelectorAll('#bs-test-opts button'); if(buttons[parseInt(e.key)-1] && !buttons[parseInt(e.key)-1].disabled) buttons[parseInt(e.key)-1].click();
            }
        }

        function triggerSuccessReveal(word) {
            document.getElementById('bs-success-img').src = word.imageUrl; document.getElementById('bs-success-word').textContent = word.word;
            const ctxEl = document.getElementById('bs-success-context');
            if(word.context) { 
                const regex = new RegExp(`(${word.word})`, 'gi');
                ctxEl.innerHTML = `"${word.context.replace(regex, '<b class="text-indigo-600">$1</b>')}"`; 
            } else { ctxEl.textContent = ""; }
            document.getElementById('bs-success-reveal').classList.remove('hidden'); if(!isGlobalAudioMuted) playAudioWord(word.word);
            document.getElementById('bs-btn-next').classList.remove('hidden');
        }

        function renderBsStage() {
            const word = bsWords[bsCurrentWordIdx]; const area = document.getElementById('bs-interactive-area'); const btnNext = document.getElementById('bs-btn-next'), feedback = document.getElementById('bs-feedback');
            feedback.innerHTML = ''; btnNext.classList.add('hidden'); area.innerHTML = ''; document.getElementById('bs-success-reveal').classList.add('hidden');
            document.removeEventListener('keydown', handleConstructorKeyboard); document.removeEventListener('keydown', handleGlobalKeyboard); document.addEventListener('keydown', handleGlobalKeyboard);

            if (bsCurrentStage === 0) renderStageIntro(word, area, btnNext);
            if (bsCurrentStage === 1) renderStageTestWT(word, area, btnNext, feedback); 
            if (bsCurrentStage === 4) renderStageTestTW(word, area, btnNext, feedback); 
            if (bsCurrentStage === 2) renderStageConstructor(word, area, btnNext, feedback);
            if (bsCurrentStage === 3) renderStageTyping(word, area, btnNext, feedback, false); 
            if (bsCurrentStage === 5) renderStageTyping(word, area, btnNext, feedback, true);  
            if (bsCurrentStage === 6) renderStageContext(word, area, btnNext, feedback);

            if((bsCurrentStage === 0 || bsCurrentStage === 5) && !isGlobalAudioMuted) playAudioWord(word.word);
        }

        function playAudioWord(text) { const u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; u.rate = 0.9; window.speechSynthesis.speak(u); }

        function renderStageIntro(word, area, btnNext) {
            area.innerHTML = `
                <div class="mx-auto w-40 h-40 rounded-xl overflow-hidden shadow-sm mb-4"><img src="${word.imageUrl}" class="w-full h-full object-cover" onerror="imgError(this)"></div>
                <h3 class="text-3xl font-bold text-slate-800 mb-1 tracking-tight">${word.word}</h3><p class="text-xl text-indigo-600 font-bold mb-2">${word.translation}</p>
                <button id="btn-intro-audio" class="mx-auto bg-slate-100 p-4 rounded-full hover:bg-slate-200 transition shadow-sm border border-slate-200"><svg class="w-7 h-7 text-indigo-600" fill="currentColor" viewBox="0 0 24 24"><path d="M13.5 4.06c0-1.336-1.616-2.005-2.56-1.06l-4.5 4.5H4.508c-1.141 0-2.318.664-2.66 1.905A9.76 9.76 0 001.5 12c0 .898.121 1.768.35 2.595.341 1.24 1.518 1.905 2.659 1.905h1.93l4.5 4.5c.945.945 2.561.276 2.561-1.06V4.06zM18.584 5.106a.75 0 11-1.06-1.06 8.25 8.25 0 000-11.668.75 0 010-1.06z"/></svg></button>
            `;
            document.getElementById('btn-intro-audio').onclick = () => playAudioWord(word.word); btnNext.textContent = "Зрозуміло (Enter)"; btnNext.classList.remove('hidden');
        }

        function getOptions(correctWord) {
            let filler = vocabulary.filter(v => v.id !== correctWord.id).sort(() => 0.5 - Math.random());
            let opts = filler.slice(0, 3);
            opts.push(correctWord); 
            return opts.sort(() => 0.5 - Math.random());
        }

        function renderStageTestWT(word, area, btnNext, feedback) {
            const opts = getOptions(word);
            area.innerHTML = `<h3 class="text-3xl font-bold text-slate-800 mb-8 tracking-tight">${word.word}</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="bs-test-opts">
                    ${opts.map((o, idx) => `<button data-id="${o.id}" class="p-4 border-2 border-slate-200 rounded-2xl font-bold text-slate-700 hover:bg-slate-50 transition active:scale-95 text-base sm:text-lg shadow-sm flex justify-between items-center"><span>${o.translation}</span><span class="text-xs bg-slate-100 text-slate-400 px-2 py-0.5 rounded shadow-inner">[${idx+1}]</span></button>`).join('')}
                </div>`;
            bindTestButtons(word, feedback);
        }

        function renderStageTestTW(word, area, btnNext, feedback) {
            const opts = getOptions(word);
            area.innerHTML = `<h3 class="text-2xl font-bold text-indigo-700 uppercase mb-8 tracking-wider">${word.translation}</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="bs-test-opts">
                    ${opts.map((o, idx) => `<button data-id="${o.id}" class="p-4 border-2 border-slate-200 rounded-2xl font-bold text-slate-700 hover:bg-slate-50 transition active:scale-95 text-xl shadow-sm flex justify-between items-center"><span>${o.word}</span><span class="text-xs bg-slate-100 text-slate-400 px-2 py-0.5 rounded shadow-inner">[${idx+1}]</span></button>`).join('')}
                </div>`;
            bindTestButtons(word, feedback);
        }

        function bindTestButtons(word, feedback) {
            document.querySelectorAll('#bs-test-opts button').forEach(b => {
                b.onclick = () => {
                    document.querySelectorAll('#bs-test-opts button').forEach(x => x.disabled = true);
                    if(b.dataset.id === word.id) {
                        b.classList.replace('border-slate-200', 'border-emerald-500'); b.classList.add('bg-emerald-50', 'text-emerald-700');
                        feedback.innerHTML = '<span class="text-emerald-600 font-bold">Відмінно! 🎉</span>'; triggerSuccessReveal(word);
                    } else {
                        b.classList.replace('border-slate-200', 'border-rose-500'); b.classList.add('bg-rose-50', 'text-rose-700');
                        document.querySelector(`#bs-test-opts button[data-id="${word.id}"]`).classList.add('bg-emerald-50', 'border-emerald-500');
                        feedback.innerHTML = `<span class="text-emerald-600 font-bold text-base bg-emerald-50 px-3 py-1 rounded border border-emerald-100">Правильно: ${word.word}</span>`; triggerSuccessReveal(word); 
                    }
                }
            });
        }

        function renderStageContext(word, area, btnNext, feedback) {
            const inputHtml = `<input type="text" id="bs-type-input" class="inline-input-context" autocomplete="off" placeholder="...">`;
            const regex = new RegExp(`\\b${word.word}\\b`, 'gi');
            let blankedContext = word.context.replace(regex, inputHtml);
            if(blankedContext === word.context) blankedContext = word.context.replace(new RegExp(word.word, 'gi'), inputHtml);
            
            area.innerHTML = `
                <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Переклад: ${word.translation}</p>
                <div class="bg-indigo-50/50 p-6 sm:p-8 rounded-2xl border border-indigo-100 mb-6">
                    <p class="text-base md:text-lg font-serif text-slate-800 leading-relaxed italic" style="line-height: 2;">"${blankedContext}"</p>
                </div>
            `;
            
            const inp = document.getElementById('bs-type-input'); setTimeout(()=>inp.focus(), 50); 
            
            inp.addEventListener('keydown', (e) => {
                if(e.key === 'Enter') {
                    e.preventDefault(); e.stopPropagation(); if(inp.disabled) return; 
                    const userVal = inp.value.trim().toLowerCase();
                    if(userVal === word.word.toLowerCase()) {
                        inp.style.borderBottomColor = '#10b981'; inp.style.color = '#047857'; inp.style.backgroundColor = '#d1fae5'; inp.disabled = true;
                        feedback.innerHTML = '<span class="text-emerald-600 font-bold">Правильно! 🏆</span>'; triggerSuccessReveal(word);
                    } else {
                        inp.style.borderBottomColor = '#f43f5e'; inp.style.color = '#be123c'; inp.style.backgroundColor = '#ffe4e6'; inp.disabled = true;
                        feedback.innerHTML = `<span class="text-emerald-600 font-bold text-base bg-emerald-50 px-3 py-1 rounded border border-emerald-100">Правильно: ${word.word}</span>`; triggerSuccessReveal(word);
                    }
                }
            });
        }

        let bsLetterPool = [], bsSelectedLetters = []; let expectedWordStr = "";
        window.handleConstructorKeyboard = (e) => {
            if(bsCurrentStage !== 2) return; const key = e.key.toLowerCase();
            if(key === 'backspace' && bsSelectedLetters.length > 0) { bsLetterPool.push(bsSelectedLetters.pop()); _renderBsC(); } 
            else if(/^[a-z\-']$/.test(key)) { const idx = bsLetterPool.findIndex(item => item.char.toLowerCase() === key); if(idx !== -1) { bsSelectedLetters.push(bsLetterPool.splice(idx, 1)[0]); _renderBsC(); } }
        };

        function renderStageConstructor(word, area, btnNext, feedback) {
            expectedWordStr = word.word.replace(/\s+/g, '').toLowerCase(); bsLetterPool = expectedWordStr.split('').map((char, i) => ({ id: i, char })).sort(() => 0.5 - Math.random()); bsSelectedLetters = [];
            area.innerHTML = `<p class="text-xl text-indigo-600 font-bold mb-6 uppercase tracking-wider">${word.translation}</p><div id="bs-c-slots" class="flex flex-wrap justify-center gap-1.5 sm:gap-2.5 mb-8 min-h-[3.5rem]"></div><div id="bs-c-pool" class="flex flex-wrap justify-center gap-2.5 min-h-[3.5rem]"></div>`;
            document.addEventListener('keydown', handleConstructorKeyboard);
            window._renderBsC = () => {
                const slots = document.getElementById('bs-c-slots'), pool = document.getElementById('bs-c-pool'); slots.innerHTML = ''; pool.innerHTML = '';
                for(let i=0; i<expectedWordStr.length; i++) {
                    const el = document.createElement('div'); el.className = 'letter-slot flex items-center justify-center text-2xl font-bold uppercase rounded-t-lg cursor-pointer ' + (bsSelectedLetters[i] ? 'bg-indigo-600 text-white shadow-lg border-b-0' : 'bg-slate-100 text-slate-300');
                    if(bsSelectedLetters[i]) { el.textContent = bsSelectedLetters[i].char; el.onclick = () => { bsLetterPool.push(bsSelectedLetters.splice(i, 1)[0]); _renderBsC(); }; }
                    slots.appendChild(el);
                }
                bsLetterPool.forEach((item, idx) => {
                    const btn = document.createElement('button'); btn.className = 'w-12 h-14 bg-white border-2 border-slate-200 rounded-xl shadow-sm text-2xl font-bold uppercase text-slate-700 hover:border-indigo-400 hover:text-indigo-600 letter-tile'; btn.textContent = item.char; btn.onclick = () => { bsSelectedLetters.push(bsLetterPool.splice(idx, 1)[0]); _renderBsC(); }; pool.appendChild(btn);
                });
                if(bsLetterPool.length === 0) {
                    if(bsSelectedLetters.map(x=>x.char).join('').toLowerCase() === expectedWordStr) {
                        feedback.innerHTML = '<span class="text-emerald-600 font-bold">Ідеально!</span>'; document.querySelectorAll('#bs-c-slots .bg-indigo-600').forEach(e => e.classList.replace('bg-indigo-600', 'bg-emerald-500'));
                        document.removeEventListener('keydown', handleConstructorKeyboard); triggerSuccessReveal(word);
                    } else { slots.classList.add('animate-pulse'); setTimeout(() => slots.classList.remove('animate-pulse'), 500); }
                } else { feedback.innerHTML = ''; btnNext.classList.add('hidden'); }
            }; _renderBsC();
        }

        function renderStageTyping(word, area, btnNext, feedback, isAudioMode) {
            const promptHTML = isAudioMode ? `<button onclick="playAudioWord('${word.word.replace(/'/g, "\\'")}')" class="mx-auto bg-indigo-100 p-5 rounded-full text-indigo-700 mb-6 hover:bg-indigo-200 hover:scale-105 transition"><svg class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24"><path d="M13.5 4.06c0-1.336-1.616-2.005-2.56-1.06l-4.5 4.5H4.508c-1.141 0-2.318.664-2.66 1.905A9.76 9.76 0 001.5 12c0 .898.121 1.768.35 2.595.341 1.24 1.518 1.905 2.659 1.905h1.93l4.5 4.5c.945.945 2.561.276 2.561-1.06V4.06zM18.584 5.106a.75 0 11-1.06-1.06 8.25 8.25 0 000-11.668.75 0 010-1.06z"/></svg></button>` : `<p class="text-2xl text-indigo-700 font-bold mb-6 uppercase tracking-wider">${word.translation}</p>`;
            area.innerHTML = `${promptHTML}<div class="flex flex-col items-center justify-center gap-3 w-full max-w-sm mx-auto relative"><input type="text" id="bs-type-input" class="w-full p-4 text-center text-3xl font-bold border-2 border-slate-300 rounded-2xl focus:border-indigo-500 outline-none transition-colors" autocomplete="off" placeholder="Англійською (Enter)"></div>`;
            const inp = document.getElementById('bs-type-input'); setTimeout(()=>inp.focus(), 50); 
            
            inp.addEventListener('keydown', (e) => {
                if(e.key === 'Enter') {
                    e.preventDefault(); e.stopPropagation(); if(inp.disabled) return; 
                    const userVal = inp.value.trim().toLowerCase();
                    if(userVal === word.word.toLowerCase()) {
                        inp.classList.replace('border-slate-300', 'border-emerald-500'); inp.classList.add('bg-emerald-50', 'text-emerald-700'); inp.disabled = true;
                        feedback.innerHTML = '<span class="text-emerald-600 font-bold">Супер! 🏆</span>'; triggerSuccessReveal(word);
                    } else {
                        inp.classList.replace('border-slate-300', 'border-rose-400'); inp.classList.add('text-rose-500', 'bg-rose-50'); inp.disabled = true;
                        feedback.innerHTML = `<span class="text-emerald-600 font-bold text-base bg-emerald-50 px-3 py-1 rounded border border-emerald-100">Правильно: ${word.word}</span>`; triggerSuccessReveal(word);
                    }
                }
            });
        }

        window.switchTab = (tab) => {
            ['dictionary', 'library', 'training'].forEach(t => { document.getElementById(`view-${t}`).classList.add('hidden'); document.getElementById(`tab-${t}`).className = 'flex-1 py-3.5 text-slate-500 hover:text-indigo-500 transition-colors border-b-[3px] border-transparent'; });
            document.getElementById(`view-${tab}`).classList.remove('hidden'); document.getElementById(`tab-${tab}`).className = 'flex-1 py-3.5 text-indigo-600 border-b-[3px] border-indigo-600 transition-colors font-bold';
            if(tab !== 'library') closeReader(); if(tab !== 'training') endSession();
            if(tab === 'dictionary') { currentDictTab = 'all'; currentMaterialFilter = null; renderDictionary(); }
        };
    </script>
</body>
</html>
